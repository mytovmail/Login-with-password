<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר ה0רטים והמשחקים הכשרים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap');
        
        :root { 
            --primary: #8b5cf6; 
            --secondary: #ec4899;
            --bg-color: #0f172a;
        }
        
        body { 
            font-family: 'Rubik', sans-serif; 
            background-color: var(--bg-color); 
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* רקע אנימטיבי מטורף */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* עיצוב זכוכית (Glassmorphism) */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* כרטיסיות (Tiles) */
        .tile-card { 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .tile-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg); transition: all 0.5s;
        }
        .tile-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.3); 
            border-color: var(--secondary);
        }
        .tile-card:hover::before { left: 125%; }

        /* סקרולר מותאם */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }

        /* אנימציות כניסה */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* עיצוב להודעות מערכת כך שישמרו על ירידות שורה */
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <!-- מסך התחברות (סיסמה) -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center glass backdrop-blur-xl transition-opacity duration-500">
        <div class="glass p-8 md:p-12 rounded-3xl text-center max-w-md w-full mx-4 border-t border-l border-white/20 shadow-2xl animate-pop">
            <div class="text-6xl mb-6 animate-bounce">🎬🎮</div>
            <h2 class="text-3xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500">ברוכים הבאים</h2>
            <p class="text-gray-300 mb-8">הזן את סיסמת הגישה למאגר</p>
            
            <input type="password" id="passInput" placeholder="סיסמה..." 
                   class="w-full px-5 py-4 rounded-xl bg-black/30 border border-white/10 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 mb-6 text-center text-xl"
                   onkeypress="if(event.key === 'Enter') checkPassword()">
            
            <button onclick="checkPassword()" class="w-full bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-500 hover:to-pink-400 text-white font-bold py-4 rounded-xl shadow-lg transform transition hover:scale-105 active:scale-95">
                כניסה למאגר
            </button>
            <p id="errorMsg" class="text-red-400 mt-4 text-sm hidden font-bold">סיסמה שגויה, נסה שוב!</p>
        </div>
    </div>

    <!-- תוכן האתר (מוסתר בהתחלה) -->
    <div id="mainContent" class="hidden flex-col min-h-screen">
        
        <header class="glass sticky top-0 z-40 border-b border-white/10">
            <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3 text-center md:text-right">
                    <span class="text-4xl">🍿</span>
                    <div>
                        <h1 class="text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-500 to-red-500">מאגר ה0רטים והמשחקים</h1>
                        <p class="text-xs text-purple-200 tracking-wider">מתעדכן אוטומטית • חינם לחלוטין</p>
                    </div>
                </div>
                
                <div class="relative w-full md:w-1/3">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400">🔍</span>
                    <input type="text" id="searchInput" placeholder="חיפוש 0רט או משחק..." 
                           class="w-full pl-4 pr-12 py-3 rounded-full glass focus:bg-white/10 border border-white/20 outline-none transition text-white placeholder-gray-300 shadow-inner">
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8 flex-grow">
            
            <!-- אזור הודעות מהנהלת האתר (נטען מגוגל שיטס) -->
            <div id="announcements-container" class="space-y-4 mb-8 hidden">
                <!-- הודעות יוזרקו לכאן -->
            </div>

            <!-- אזור ניווט / פירורי לחם -->
            <div class="glass rounded-2xl p-4 mb-8 flex items-center gap-2 overflow-x-auto whitespace-nowrap scroll-smooth">
                <div id="breadcrumbsContainer" class="flex items-center gap-2 text-sm md:text-base font-medium">
                    טוען נתונים...
                </div>
            </div>

            <!-- כותרת תוצאות חיפוש -->
            <div id="searchResultsHeader" class="hidden mb-6 text-center">
                <h3 class="text-2xl font-bold">תוצאות חיפוש: <span id="searchCount" class="text-pink-400"></span></h3>
                <button onclick="clearSearch()" class="mt-2 px-6 py-2 glass rounded-full hover:bg-white/10 text-sm transition text-pink-300">חזור לתיקיות ✕</button>
            </div>

            <!-- הגריד של הקבצים -->
            <div id="explorerGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                <!-- נתונים יוזרקו לכאן -->
            </div>

            <!-- סמן גלילה למטה לטעינה עצלה (Infinite Scroll) -->
            <div id="loading-sentinel" class="col-span-full py-8 mt-4 text-center hidden">
                <div class="inline-flex items-center gap-2 px-6 py-3 glass rounded-full text-pink-300 animate-pulse">
                    <span class="text-xl">⏳</span> טוען קבצים נוספים...
                </div>
            </div>

        </main>

        <footer class="mt-auto glass border-t border-white/10 text-center py-6 text-sm text-gray-400">
            <p>נבנה באהבה ❤️ | על ידי myylbwt@gmail.com</p>
        </footer>
    </div>

    <script>
        // ==========================================
        // 1. הגדרת סיסמה (החלף למה שבא לך)
        const SITE_PASSWORD = "458967"; 
        
        // 2. חיבור לקובץ ה-JSON שמיוצר על ידי הסקריפט ונשמר בגיטהאב
        const DATA_JSON_URL = 'https://raw.githubusercontent.com/mytovmail/Login-with-password/main/data.json';
        
        // 3. חיבור להודעות גוגל שיטס (הומר ל-CSV)
        const MESSAGES_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSgUqLHEGqyAlO0fcbSFuuXnWn5F-3WoUBkV31yFqWlH6iWXAd_rbUY0fq3-PbMoUcxidwjtM19-1AB/pub?gid=321355246&single=true&output=csv';
        // ==========================================

        let fileSystem = { name: "ראשי", type: "folder", children: {} };
        let currentPathArr = []; 
        let allSearchableItems = []; 
        
        // משתנים למנגנון הטעינה העצלה (Lazy Loading)
        const BATCH_SIZE = 50; 
        let currentDisplayItems = []; 
        let currentlyDisplayedCount = 0;
        let intersectionObserver = null;

        // מערכת התחברות בסיסית
        function checkPassword() {
            const input = document.getElementById('passInput').value;
            if (input === SITE_PASSWORD) {
                document.getElementById('loginScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                    document.getElementById('mainContent').classList.add('flex');
                    fetchAnnouncements(); // טוען הודעות רק אחרי התחברות
                    fetchExplorerData();
                }, 500);
            } else {
                const err = document.getElementById('errorMsg');
                err.classList.remove('hidden');
                err.classList.add('animate-bounce');
                setTimeout(() => err.classList.remove('animate-bounce'), 1000);
            }
        }

        // ==========================================
        // מערכת הודעות (גוגל שיטס)
        // ==========================================
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0, c = 0;
            for (; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        async function fetchAnnouncements() {
            try {
                const response = await fetch(MESSAGES_SHEET_URL);
                if (!response.ok) return;
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                const validRows = rows.filter(row => row.join('').trim().length > 0);
                if (validRows.length === 0) return;
                
                const messagesHTML = validRows.map((row, index) => {
                    const messageText = row[0] || '';
                    if (!messageText.trim() && index === 0) return '';
                    const safeHtml = escapeHTML(messageText);
                    return `
                        <div class="glass border-r-4 border-pink-500 py-3 px-4 rounded-xl shadow-lg flex items-start animate-pop h-auto">
                            <div class="flex-shrink-0 text-xl ml-3 mt-0.5 drop-shadow-md">📢</div>
                            <div class="w-full flex-1 min-w-0">
                                <div class="text-sm text-gray-100 message-content leading-relaxed">${safeHtml}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                if (messagesHTML.trim() !== '') {
                    const container = document.getElementById('announcements-container');
                    container.innerHTML = messagesHTML;
                    container.classList.remove('hidden');
                }
            } catch (error) { console.error('שגיאה בטעינת הודעות המערכת:', error); }
        }

        // ==========================================
        // משיכת נתונים ובניית המערכת
        // ==========================================
        function showSkeletons() {
            const grid = document.getElementById('explorerGrid');
            grid.innerHTML = Array(15).fill().map((_, i) => `
                <div class="glass rounded-2xl p-5 aspect-[4/5] flex flex-col items-center justify-center animate-pulse" style="animation-delay: ${i*0.1}s">
                    <div class="w-20 h-20 bg-white/10 rounded-full mb-4"></div>
                    <div class="h-4 bg-white/10 rounded w-3/4 mb-2"></div>
                    <div class="h-3 bg-white/10 rounded w-1/2"></div>
                </div>`).join('');
        }

        async function fetchExplorerData() {
            showSkeletons();
            try {
                const response = await fetch(DATA_JSON_URL + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error('הקובץ עדיין לא נוצר בגיטהאב או שיש שגיאה בקישור.');
                const data = await response.json();
                buildFileSystem(data);
            } catch (error) { 
                console.error("שגיאה:", error); 
                document.getElementById('explorerGrid').innerHTML = `
                    <div class="col-span-full text-center py-10">
                        <p class="text-red-400 text-xl font-bold mb-2">שגיאה בטעינת הנתונים</p>
                        <p class="text-gray-300">וודא שהרצת את הסקריפט בגוגל שיטס ושהוא יצר את הקובץ data.json בגיטהאב.</p>
                    </div>`;
            }
        }

        function buildFileSystem(jsonData) {
            fileSystem.children = {}; 
            allSearchableItems = [];
            
            jsonData.forEach(item => {
                const pathStr = item["נתיב_תיקיה"] || "";
                const fileName = item["שם_קובץ"] || "";
                const type = item["סוג"] || "";
                const link = item["קישור"] || "";
                const creationDate = item["תאריך_יצירה"] || "";
                
                if(!pathStr || !fileName) return;

                const fileObj = { name: fileName, type: type, link: link, path: pathStr, date: creationDate };
                
                const folders = pathStr.split('/');
                let currentNode = fileSystem;
                let currentPathBuild = [];
                let startIndex = folders[0] === "ראשי" ? 1 : 0;
                if(folders[0] === "ראשי") currentPathBuild.push("ראשי");

                for (let j = startIndex; j < folders.length; j++) {
                    let folderName = folders[j];
                    currentPathBuild.push(folderName);
                    if (!currentNode.children[folderName]) {
                        currentNode.children[folderName] = { name: folderName, type: "folder", pathArr: [...currentPathBuild], children: {} };
                    }
                    currentNode = currentNode.children[folderName];
                }
                currentNode.children[fileName] = fileObj;
            });
            
            function collectAllItems(node, collection) {
                for (const key in node.children) {
                    const child = node.children[key];
                    child.searchIndex = (child.name + " " + (child.path || "")).toLowerCase();
                    collection.push(child);
                    if (child.type === "folder") collectAllItems(child, collection);
                }
            }
            collectAllItems(fileSystem, allSearchableItems);
            renderCurrentFolder();
        }

        function navigateTo(index) {
            clearSearch(false);
            if (index === -1) currentPathArr = []; else currentPathArr = currentPathArr.slice(0, index + 1);
            renderCurrentFolder();
        }

        function jumpToFolderFromSearch(pathString) {
            const pathArray = pathString.split('||');
            if(pathArray[0] === "ראשי") pathArray.shift();
            currentPathArr = pathArray;
            clearSearch(false);
            renderCurrentFolder();
        }

        function renderCurrentFolder() {
            let currentNode = fileSystem;
            for (let folder of currentPathArr) { if(currentNode.children[folder]) currentNode = currentNode.children[folder]; }
            
            const breadcrumbsDiv = document.getElementById('breadcrumbsContainer');
            let breadcrumbsHTML = `<button onclick="navigateTo(-1)" class="hover:bg-white/20 bg-white/10 px-4 py-2 rounded-xl flex items-center gap-2 transition duration-300 shadow-lg border border-white/5"><span class="text-xl">🏠</span> ראשי</button>`;
            
            currentPathArr.forEach((folder, index) => {
                breadcrumbsHTML += `<span class="text-pink-500 font-bold mx-1">❯</span><button onclick="navigateTo(${index})" class="hover:bg-white/20 bg-transparent px-3 py-2 rounded-xl transition duration-300 border border-transparent hover:border-white/10">${folder}</button>`;
            });
            breadcrumbsDiv.innerHTML = breadcrumbsHTML;
            
            drawGrid(Object.values(currentNode.children));
        }

        // ==========================================
        // מנגנון הטעינה העצלה (Lazy Loading) המשודרג
        // ==========================================
        function drawGrid(items) {
            const gridDiv = document.getElementById('explorerGrid');
            gridDiv.innerHTML = '';
            currentlyDisplayedCount = 0;
            
            if (items.length === 0) { 
                gridDiv.innerHTML = '<div class="col-span-full py-20 text-center text-gray-400 text-2xl animate-pulse">אין פה כלום... 🏜️</div>'; 
                document.getElementById('loading-sentinel').classList.add('hidden');
                return; 
            }
            
            // מיון הרשימה המלאה פעם אחת מראש
            currentDisplayItems = items.sort((a, b) => {
                if (a.type === "folder" && b.type !== "folder") return -1;
                if (a.type !== "folder" && b.type === "folder") return 1;
                return a.name.localeCompare(b.name);
            });

            renderNextBatch(); // טעינת המנה הראשונה
            setupIntersectionObserver(); // הפעלת המעקב לגלילה
        }

        function renderNextBatch() {
            const gridDiv = document.getElementById('explorerGrid');
            const endIndex = Math.min(currentlyDisplayedCount + BATCH_SIZE, currentDisplayItems.length);
            
            let batchHTML = '';

            for (let i = currentlyDisplayedCount; i < endIndex; i++) {
                const item = currentDisplayItems[i];
                // איפוס זמן ההשהיה כדי שהאנימציה תעבוד על כל מנה שנטענת בנפרד
                const delay = (i - currentlyDisplayedCount) * 0.05; 
                
                if (item.type === "folder") {
                    const pathStr = item.pathArr ? item.pathArr.join('||') : item.name;
                    const safePathStr = pathStr.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    const itemCount = Object.keys(item.children || {}).length;
                    
                    batchHTML += `
                        <div onclick="jumpToFolderFromSearch('${safePathStr}')" class="tile-card glass rounded-3xl p-6 cursor-pointer flex flex-col items-center justify-center text-center aspect-square border border-white/10 group animate-pop" style="animation-delay: ${delay}s">
                            <div class="w-20 h-20 mb-4 rounded-2xl bg-gradient-to-br from-purple-500/20 to-pink-500/20 flex items-center justify-center group-hover:scale-110 transition duration-300">
                                <span class="text-5xl drop-shadow-lg">📁</span>
                            </div>
                            <span class="font-extrabold text-white line-clamp-2 text-lg drop-shadow-md">${item.name}</span>
                            <span class="text-xs text-purple-300 mt-2 bg-purple-900/50 px-3 py-1 rounded-full">${itemCount} פריטים</span>
                        </div>`;
                } else {
                    let icon = "📄"; let colorClass = "from-gray-500 to-gray-700";
                    if(item.type === "וידאו") { icon = "🎬"; colorClass = "from-blue-500 to-indigo-600"; }
                    if(item.type === "משחק/תוכנה") { icon = "🎮"; colorClass = "from-green-400 to-emerald-600"; }
                    if(item.type === "שמע") { icon = "🎧"; colorClass = "from-yellow-400 to-orange-500"; }
                    
                    batchHTML += `
                        <a href="${item.link}" target="_blank" class="tile-card glass rounded-3xl border border-white/10 cursor-pointer flex flex-col relative h-full aspect-[4/5] animate-pop group" style="animation-delay: ${delay}s">
                            <div class="h-2 w-full bg-gradient-to-r ${colorClass} rounded-t-3xl opacity-80 group-hover:opacity-100 transition"></div>
                            <div class="p-6 flex flex-col items-center flex-grow justify-center text-center">
                                <div class="w-20 h-20 rounded-2xl bg-gradient-to-br ${colorClass} flex items-center justify-center mb-5 shadow-lg group-hover:rotate-12 transition duration-300">
                                    <span class="text-4xl filter drop-shadow-md">${icon}</span>
                                </div>
                                <h3 class="font-bold text-white text-md mb-2 line-clamp-3 leading-snug drop-shadow-md">${item.name}</h3>
                            </div>
                        </a>`;
                }
            }

            // הזרקת המנה כולה בבת אחת למען ביצועים מקסימליים
            gridDiv.insertAdjacentHTML('beforeend', batchHTML);
            currentlyDisplayedCount = endIndex;

            // עדכון מצב סמן הגלילה
            const sentinel = document.getElementById('loading-sentinel');
            if (currentlyDisplayedCount >= currentDisplayItems.length) {
                sentinel.classList.add('hidden');
            } else {
                sentinel.classList.remove('hidden');
            }
        }

        function setupIntersectionObserver() {
            if (intersectionObserver) intersectionObserver.disconnect();
            
            const sentinel = document.getElementById('loading-sentinel');
            intersectionObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && currentlyDisplayedCount < currentDisplayItems.length) {
                    renderNextBatch();
                }
            }, {
                rootMargin: '250px' // מתחיל לטעון קצת לפני שמגיעים למטה
            });
            
            intersectionObserver.observe(sentinel);
        }

        function handleSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const breadcrumbs = document.getElementById('breadcrumbsContainer');
            const searchHeader = document.getElementById('searchResultsHeader');

            if (searchTerm === "") {
                breadcrumbs.parentElement.classList.remove('hidden'); 
                searchHeader.classList.add('hidden');
                renderCurrentFolder(); 
                return;
            }
            
            breadcrumbs.parentElement.classList.add('hidden'); 
            searchHeader.classList.remove('hidden');
            document.getElementById('searchCount').innerText = "מחפש...";

            let results = [];
            for (let i = 0; i < allSearchableItems.length; i++) {
                if (allSearchableItems[i].searchIndex.includes(searchTerm)) {
                    results.push(allSearchableItems[i]);
                }
            }

            // עדכון כותרת (כעת הגלילה החכמה מטפלת בעומס, אז אפשר להציג את כל התוצאות ללא הגבלה!)
            document.getElementById('searchCount').innerText = `${results.length} תוצאות`;
            drawGrid(results);
        }

        let searchTimeout = null;
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                handleSearch();
            }, 400); 
        });
        
        function clearSearch(render = true) {
            document.getElementById('searchInput').value = "";
            document.getElementById('breadcrumbsContainer').parentElement.classList.remove('hidden');
            document.getElementById('searchResultsHeader').classList.add('hidden');
            if(render) renderCurrentFolder();
        }

    </script>
